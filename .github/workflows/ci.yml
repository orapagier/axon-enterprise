name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (backend)
        working-directory: apps/backend
        run: npx tsc -p tsconfig.json --noEmit

      - name: Typecheck (storefront)
        working-directory: apps/storefront
        run: npx tsc --noEmit

      # TODO: re-enable once the ESLint/ajv toolchain is fixed (see the scoped
      # override in the root package.json). Kept non-blocking for now.
      # - name: Lint (storefront)
      #   working-directory: apps/storefront
      #   run: npm run lint
      #   continue-on-error: true
